# Orchestrator Boundary Tests
# Tests for input validation and error handling

# --- Missing Required Fields ---
- id: BOUND-CREATE-01
  method: orchestrator.workflow.create
  desc: Missing id field
  input:
    category: Test
    name: Test
    desc: Test
    steps: []
  expect:
    ok: false
    error: "MISSING_PARAM: id required"

- id: BOUND-CREATE-02
  method: orchestrator.workflow.create
  desc: Missing category field
  input:
    id: test_bound
    name: Test
    desc: Test
    steps: []
  expect:
    ok: false
    error: "MISSING_PARAM: category required"

- id: BOUND-CREATE-03
  method: orchestrator.workflow.create
  desc: Missing steps field
  input:
    id: test_bound
    category: Test
    name: Test
    desc: Test
  expect:
    ok: false
    error: "MISSING_PARAM: steps array required"

- id: BOUND-CREATE-04
  method: orchestrator.workflow.create
  desc: Steps is not an array
  input:
    id: test_bound
    category: Test
    name: Test
    desc: Test
    steps: "not an array"
  expect:
    ok: false
    error: "MISSING_PARAM: steps array required"

# --- Invalid Step Structure ---
- id: BOUND-STEP-01
  method: orchestrator.workflow.create
  desc: Step missing id
  input:
    id: test_step_bound
    category: Test
    name: Test
    desc: Test
    steps:
      - service: sample
        method: sample.ping
        params: {}
  expect:
    ok: false
    error: "INVALID_STEP: step.id required"

- id: BOUND-STEP-02
  method: orchestrator.workflow.create
  desc: Step missing service
  input:
    id: test_step_bound
    category: Test
    name: Test
    desc: Test
    steps:
      - id: s1
        method: sample.ping
        params: {}
  expect:
    ok: false
    error: "INVALID_STEP: step.service required"

- id: BOUND-STEP-03
  method: orchestrator.workflow.create
  desc: Step missing method
  input:
    id: test_step_bound
    category: Test
    name: Test
    desc: Test
    steps:
      - id: s1
        service: sample
        params: {}
  expect:
    ok: false
    error: "INVALID_STEP: step.method required"

