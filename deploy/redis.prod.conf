# deploy/redis.prod.conf — production Redis baseline for SOLO (toFix §6.5).
#
# Redis holds EVERYTHING security-relevant in this stack: sessions, permits,
# bot tokens, WAL ledger, relay tokens. Running it open on localhost is fine
# for dev (deploy/dev.sh, port 6699, no auth); in production use this file:
#
#   redis-server /path/to/redis.prod.conf
#
# and point every service at it via ONE env var (password travels in the URL —
# all 13 services + walarchiver + relay read REDIS_URL, no code change needed):
#
#   export REDIS_URL="redis://:${REDIS_PASSWORD}@127.0.0.1:6699"
#
# TLS (optional, terminate in redis 6+): add tls-port/cert lines below and use
# rediss:// in REDIS_URL.

# ── Network ──────────────────────────────────────────────────────────────────
bind 127.0.0.1
port 6699
protected-mode yes

# ── Auth — REQUIRED. Replace before first start (or render via envsubst). ───
requirepass CHANGE_ME_BEFORE_DEPLOY

# ── Persistence — AOF is the durability story for sessions/WAL hot ledger. ──
appendonly yes
appendfsync everysec

# ── Memory safety — never silently evict auth/WAL data. ─────────────────────
maxmemory-policy noeviction

# ── Hygiene ──────────────────────────────────────────────────────────────────
# Rename away the foot-guns admins reach for on shared boxes.
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "CONFIG_solo_admin"
